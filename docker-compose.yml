version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: syncoboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["bun", "run", "start:web"]
    environment:
      # Auth.js / NextAuth
      AUTH_SECRET: "your-auth-secret-here"
      AUTH_URL: "http://localhost:3000"
      AUTH_TRUST_HOST: "true"

      # Database Connection
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/syncoboard?schema=public"

      # OAuth Providers
      AUTH_GITHUB_ID: "your-github-oauth-app-id"
      AUTH_GITHUB_SECRET: "your-github-oauth-app-secret"
      AUTH_GITLAB_CLIENT_ID: "your-gitlab-client-id"
      AUTH_GITLAB_CLIENT_SECRET: "your-gitlab-client-secret"

      # GitHub App integration
      NEXT_PUBLIC_GITHUB_APP_NAME: "your-github-app-name"
      GITHUB_APP_ID: "your-github-app-id"
      GITHUB_APP_PRIVATE_KEY: "your-github-app-private-key"
      GITHUB_WEBHOOK_SECRET: "your-github-webhook-secret"
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  cron:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["bun", "run", "start:cron"]
    environment:
      # Database Connection
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/syncoboard?schema=public"
    depends_on:
      - postgres

volumes:
  postgres_data:
