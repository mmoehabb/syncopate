name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: syncoboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install

      - name: Format check
        run: bun check

      - name: Lint
        run: bun lint

      - name: Build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/syncoboard"
        run: bun run build

      - name: Setup test environment
        run: |
          echo 'DATABASE_URL="postgresql://postgres:postgres@localhost:5432/syncoboard_test"' > packages/db/.env.test

      - name: Test
        run: bun run test
